# CI/CD Pipeline for go-web-app
name: CI/CD

on:
  push:
    branches:
      - main
    paths-ignore:
      - "charts/**"
      - "k8s/**"
      - "README.md"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build
        run: go build -o go-web-app

      - name: Test
        run: go test ./...

  code-quality:
    runs-on: ubuntu-latest
    continue-on-error: true # Allows the pipeline to continue even if linter has internal errors
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.56.2
          args: --timeout=5m --issues-exit-code=0

  push:
    runs-on: ubuntu-latest
    needs: build # Only waits for the build to pass, ignoring linter issues
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Note: Ensure DOCKERHUB_USERNAME is a secret in your repo settings
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/go-web-app:${{ github.run_id }}

  update-newtag-in-helm-chart:
    runs-on: ubuntu-latest
    needs: push
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN }}

      - name: Update tag in Helm chart
        run: |
          # Ensuring path matches your folder: charts/go-web-app/
          sed -i 's/tag: .*/tag: "${{ github.run_id }}"/' charts/go-web-app/values.yaml

      - name: Commit and push changes
        run: |
          git config --global user.email "vijaygour@example.com"
          git config --global user.name "Vijay Gour"
          git add charts/go-web-app/values.yaml
          git commit -m "Update tag to ${{ github.run_id }} [skip ci]"
          git push