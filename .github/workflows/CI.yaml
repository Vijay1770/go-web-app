name: CI/CD

on:
  push:
    branches: [ main ]
    paths-ignore:
      - "charts/**"
      - "k8s/**"
      - "README.md"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build
        run: go build -o go-web-app
      - name: Test
        run: go test ./...

  code-quality:
    runs-on: ubuntu-latest
    needs: build
    # continue-on-error ensures that linter issues don't stop the push/helm jobs
    continue-on-error: true 
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          # Using a newer version compatible with Go 1.22
          version: v1.59
          args: --timeout=5m --issues-exit-code=0

  push:
    runs-on: ubuntu-latest
    # We only 'need' build. We don't wait for code-quality to keep the pipeline fast.
    needs: build 
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/go-web-app:${{ github.run_id }}

  update-newtag-in-helm-chart:
    runs-on: ubuntu-latest
    needs: push
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN }}
      - name: Update tag in Helm chart
        run: |
          sed -i 's/tag: .*/tag: "${{ github.run_id }}"/' charts/go-web-app/values.yaml
      - name: Commit and push changes
        run: |
          git config --global user.email "vijaygour@example.com"
          git config --global user.name "Vijay Gour"
          git add charts/go-web-app/values.yaml
          git commit -m "Update tag to ${{ github.run_id }} [skip ci]"
          git push