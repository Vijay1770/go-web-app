# CICD using GitHub actions
name: CI/CD

on:
  push:
    branches:
      - main
    paths-ignore:
      - "charts/**" # Updated to match your folder name
      - "k8s/**"
      - "README.md"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Go 1.22
        uses: actions/setup-go@v5 # v5 is the latest/stable version
        with:
          go-version: "1.22"
      - name: Build
        run: go build -o go-web-app
      - name: Test
        run: go test ./...

  code-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.56.2
          # This tells the linter not to fail the whole build if it hits an internal error
          args: --timeout=5m --issues-exit-code=0

  push:
    runs-on: ubuntu-latest
    needs: [build] # Pushes only if tests and linting pass
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Using github.run_id is great for unique versioning
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/go-web-app:${{ github.run_id }}

  update-newtag-in-helm-chart:
    runs-on: ubuntu-latest
    needs: push
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN }} # Ensure this secret is a PAT with "repo" scope

      - name: Update tag in Helm chart
        run: |
          # Fixed path to match your "charts/go-web-app" directory
          sed -i 's/tag: .*/tag: "${{ github.run_id }}"/' charts/go-web-app/values.yaml

      - name: Commit and push changes
        run: |
          git config --global user.email "vijaygour@example.com" # Use your email
          git commit -m "Update tag to ${{ github.run_id }} [skip ci]"
          git add charts/go-web-app/values.yaml
          git commit -m "Update tag to ${{ github.run_id }} [skip ci]"
          git push
