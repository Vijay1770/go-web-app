apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-web-app
  labels:
    app: go-web-app
spec:
  replicas: 1
  #- Tells Kubernetes which pods belong to this Deployment (it matches pods with the label app: go-web-app).
  selector:
    matchLabels:
      app: go-web-app
  #template defines what each pod looks like
  template:
    metadata:
      labels:
        app: go-web-app
  #spec->container:-Defines the container(s) inside the pod.
    spec:
      containers:
      - name: go-web-app
        image: vijay17700/gp-web-app:v1
        ports:
        - containerPort: 8080